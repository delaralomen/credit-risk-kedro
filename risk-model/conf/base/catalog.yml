# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog

# Data Preprocessing
download_status:
  type: MemoryDataset

# Data Processing
raw_loans:
  type: pandas.CSVDataset
  filepath: data/01_raw/accepted_2007_to_2018Q4.csv

clean_loans:
  type: pandas.CSVDataset
  filepath: data/02_intermediate/clean_loans.csv

# Feature Engineering
features:
  type: pandas.CSVDataset
  filepath: data/03_primary/feature_loans.csv


# Data Split
X_train:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_train.parquet

X_test:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_test.parquet

y_train:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/y_train.parquet

y_test:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/y_test.parquet


# Linear Classifier
log_reg_model:
  type: pickle.PickleDataset
  filepath: data/06_models/log_reg.pkl

# Non-linear Classifier
xgb_model:
  type: pickle.PickleDataset
  filepath: data/06_models/xgb_model.pkl

# Parameters Obtained Through Hyperparameter Tuning
optuna_params:
  type: pickle.PickleDataset
  filepath: data/07_model_output/best_params.pkl

# Non-linear Classifier with Hyperparameter Tuning
xgb_optimized:
  type: pickle.PickleDataset
  filepath: data/06_models/xgb_model.pkl

# Hyperparameter Tuning Report
hyperparam_study:
  type: pickle.PickleDataset
  filepath: "data/08_reporting/hyperparam_study.pkl"

# Predictions
predictions:
  type: pandas.CSVDataset
  filepath: data/07_model_output/predicted_loans.csv


# Individual Models Evaluation
model_metrics:
  type: pandas.CSVDataset
  filepath: data/08_reporting/model_metrics.csv


# Cross Validation Evaluation
cross_val_metrics:
  type: pandas.CSVDataset
  filepath: data/08_reporting/cross_val_metrics.csv

# SHAP
shap_plot:
  type: matplotlib.MatplotlibDataset
  filepath: data/08_reporting/shap_summary.png